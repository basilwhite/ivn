# Synchronization Configuration

# This file defines configuration for the bidirectional sync system
# Edit as needed for your project

# File Patterns
[patterns]
# Python scripts to include (glob patterns)
script_pattern = *.py

# Scripts to exclude from synchronization
exclude_patterns = sync_*.py, _*.py, __*.py, test_*.py, setup.py

# Prompt file naming convention
prompt_suffix = _prompt.txt


# Sync Manager Settings
[sync_manager]
# How often to check for changes (seconds)
watch_interval = 5

# State file to track file hashes
state_file = .sync_state.json

# Log file for sync events
log_file = sync_log.json

# Maximum log entries to keep
max_log_entries = 100


# Prompt Generator Settings
[prompt_generator]
# Minimum content length for sections (characters)
min_section_length = 50

# Include private methods in documentation
include_private = false

# Include test functions
include_tests = false


# Validator Settings
[validator]
# Minimum similarity ratio for script content (0.0 to 1.0)
min_similarity = 0.95

# Maximum time difference before warning (seconds)
max_time_diff = 60

# Validation report filename
report_file = validation_report.json


# Required Sections
[required_sections]
# These sections must be present in every prompt file
sections = 
    PROBLEM STATEMENT
    BROADER CONTEXT
    CONCEPTS TO UNDERSTAND
    SCRIPT OVERVIEW
    TECHNICAL DETAILS
    INPUT/OUTPUT SPECIFICATIONS
    SUCCESS CRITERIA
    CORRECT BEHAVIOR DEFINITION
    EXAMPLE SCENARIOS
    TEST CASES
    IMPLEMENTATION GUIDE
    ACTUAL SCRIPT CONTENT


# Warning Thresholds
[thresholds]
# Maximum allowed placeholders before warning
max_placeholders = 10

# Minimum prompt file size (bytes)
min_prompt_size = 1000


# Directories
[directories]
# Directory to watch (. for current directory)
watch_directory = .

# Output directory for reports
output_directory = .


# Notifications
[notifications]
# Show notification for script changes
notify_on_script_change = true

# Show notification for prompt changes
notify_on_prompt_change = true

# Show notification for validation errors
notify_on_validation_error = true


# Advanced
[advanced]
# Automatically regenerate prompts when scripts change
auto_regenerate = true

# Automatically validate after sync
auto_validate = false

# Create backup before overwriting
create_backup = false

# Backup directory
backup_directory = .backup
